services:
  postgres:
    image: postgres:16-alpine
    container_name: mqp_postgres
    environment:
      POSTGRES_DB: mqp_db
      POSTGRES_USER: mqp_user
      POSTGRES_PASSWORD: mqp_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - mqp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mqp_user -d mqp_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mqp_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://mqp_user:mqp_pass@postgres:5432/mqp_db
    volumes:
      - pdf_storage:/app/pdfs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mqp_network
    command: >
      sh -c "
        alembic upgrade head &&
        python seed.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mqp_frontend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - mqp_network
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  pdf_storage:

networks:
  mqp_network:
    name: mqp_network
